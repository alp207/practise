services:
  - type: web
    name: dragon-duel-server
    runtime: node
    plan: free
    region: frankfurt
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health

  - type: web
    name: dragon-duel-arena
    runtime: static
    buildCommand: node build-static.mjs
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: SKIP_INSTALL_DEPS
        value: true
      - key: LIVE_SERVER_URL
        fromService:
          type: web
          name: dragon-duel-server
          envVarKey: RENDER_EXTERNAL_URL
